<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
  <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
  
  <div class="container">
    <aside class="sidebar">
      <div class="profile-section">
        <img src="/zhao-blog.github.io/assets/img/photo_2026-03-05_21-33-20.jpg" alt="头像" class="profile-img">
        <div class="profile-name">赵洋</div>
        <div class="profile-bio">记录生活与思考</div>
      </div>
      
      <ul class="nav-links">
        <li><a href="/zhao-blog.github.io/">首页</a></li>
        <li><a href="/zhao-blog.github.io/categories.html">分类</a></li>
        <li><a href="/zhao-blog.github.io/tags.html">标签</a></li>
        <li><a href="/zhao-blog.github.io/archives.html" class="active">归档</a></li>
        <li><a href="/zhao-blog.github.io/about.html">关于</a></li>
      </ul>
      
      <div class="social-links">
        <a href="https://github.com/zhao922-bot" target="_blank">🐙</a>
        <a href="mailto:1405286051@qq.com">✉️</a>
        <a href="/zhao-blog.github.io/feed.xml">📡 RSS</a>
      </div>
    </aside>
    
    <main class="main-content">
      <header class="page-header">
        <h1 class="page-title">归档</h1>
      </header>
      
      <section class="posts-section">
        <h3 class="section-title">2025</h3>
        <ul class="posts-list">
          <li class="post-item">
            <div class="post-meta">2025-03</div>
            <h3 class="post-title">
              <a href="/zhao-blog.github.io/posts/welcome.html">一个存放想法的小角落</a>
            </h3>
          </li>
        </ul>
      </section>
      
      <footer class="site-footer">
        <p>© 2025 赵洋的数字花园. All rights reserved.</p>
      </footer>
    </main>
  </div>
  
  <script>
    // 主题切换 - 排除图片和图标
    function toggleTheme() {
      const html = document.documentElement;
      const images = document.querySelectorAll('.profile-img, .social-links a, .theme-toggle');
      
      if (html.style.filter === 'invert(1)') {
        html.style.filter = '';
        localStorage.setItem('theme', 'light');
        document.querySelector('.theme-toggle').textContent = '🌙';
        images.forEach(img => img.style.filter = '');
      } else {
        html.style.filter = 'invert(1)';
        localStorage.setItem('theme', 'dark');
        document.querySelector('.theme-toggle').textContent = '☀️';
        images.forEach(img => img.style.filter = 'invert(0)');
      }
    }
    
    // 检查保存的主题
    if (localStorage.getItem('theme') === 'dark') {
      document.documentElement.style.filter = 'invert(1)';
      document.querySelector('.theme-toggle').textContent = '☀️';
      const images = document.querySelectorAll('.profile-img, .social-links a, .theme-toggle');
      images.forEach(img => img.style.filter = 'invert(0)');
    }
  </script>
</body>
</html>
