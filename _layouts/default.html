<!DOCTYPE html>
<html lang="{{ site.lang | default: 'zh-CN' }}">
<head>
  {% include head.html %}
</head>
<body>
  <a class="skip-link" href="#main-content">跳到主要内容</a>
  <button class="theme-toggle" type="button" aria-label="切换深浅色主题" aria-pressed="false">深色</button>
  <div class="site-shell">
    {% include sidebar.html %}
    <main id="main-content" class="main-content" tabindex="-1">
      {{ content }}
      {% include footer.html %}
    </main>
  </div>
  {% assign asset_version = site.time | date: '%Y%m%d%H%M%S' %}
  <script src="{{ '/assets/js/theme.js' | relative_url }}?v={{ asset_version }}" defer></script>
  <script src="{{ '/assets/js/search.js' | relative_url }}?v={{ asset_version }}" defer></script>
  <script src="{{ '/assets/js/back-to-top.js' | relative_url }}?v={{ asset_version }}" defer></script>
  {% if page.layout == 'post' %}<script src="{{ '/assets/js/toc.js' | relative_url }}?v={{ asset_version }}" defer></script>{% endif %}
</body>
</html>
